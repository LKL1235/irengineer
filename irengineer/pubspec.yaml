name: irengineer
description: iREngineer — iRacing lap coach and Garage 61-style local analyze (Flutter Desktop, pure Dart).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  csv: ^6.0.0
  crypto: ^3.0.6
  ffi: ^2.1.3
  file_picker: ^8.1.7
  fl_chart: ^0.69.2
  flutter_map: ^7.0.2
  flutter_riverpod: ^2.6.1
  http: ^1.2.2
  just_audio: ^0.9.42
  latlong2: ^0.9.1
  path: ^1.9.0
  tray_manager: ^0.2.3
  win32: ^5.9.0
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/templates/
    - assets/icons/tray.ico
